services:
  postgres:
    image: postgres:16-alpine
    container_name: missedrun-selfhosted-postgres
    environment:
      POSTGRES_USER: missedrun
      POSTGRES_PASSWORD: missedrun
      POSTGRES_DB: missedrun
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5439:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: missedrun-selfhosted-backend
    env_file:
      - .env
    ports:
      - "8008:8000"
    depends_on:
      - postgres

  checker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: missedrun-selfhosted-checker
    command: python -m app.workers.checker
    env_file:
      - .env
    depends_on:
      - postgres

volumes:
  postgres-data:
